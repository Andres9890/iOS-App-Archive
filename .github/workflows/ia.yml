name: Extract IA Apps Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  extract-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@2 @google/generative-ai@latest

      - name: Extract IA apps and format metadata
        env:
          IA_ACCOUNT: legacyios_archive
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/extract-ia-apps.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add iOS-App-Archive/script.js iOS-App-Archive/app-icon/
          git commit -m "Update app metadata and images from IA"
          git push
